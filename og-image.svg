<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="80%">
      <stop offset="0%" stop-color="#FBF8F2"/>
      <stop offset="55%" stop-color="#F4ECDC"/>
      <stop offset="100%" stop-color="#E8DBC1"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="42%" r="38%">
      <stop offset="0%" stop-color="#FFF3D6" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#E5D2A8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#E5D2A8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D8C29A"/>
      <stop offset="55%" stop-color="#B89A66"/>
      <stop offset="100%" stop-color="#A88A4F"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A88A4F" stop-opacity="0"/>
      <stop offset="50%" stop-color="#A88A4F" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#A88A4F" stop-opacity="0"/>
    </linearGradient>
    <filter id="paper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="2" seed="3" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.42  0 0 0 0 0.34  0 0 0 0 0.22  0 0 0 0.04 0"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#halo)"/>

  <!-- Inner hairline frame -->
  <rect x="44" y="44" width="1112" height="542" fill="none" stroke="url(#gold)" stroke-opacity="0.45" stroke-width="1"/>

  <!-- Eyebrow -->
  <text x="600" y="166" text-anchor="middle"
        font-family="Inter, Helvetica, Arial, sans-serif"
        font-size="20" letter-spacing="9"
        fill="#A88A4F" font-weight="500">
    SACRAMENTO DEL BAUTISMO
  </text>

  <!-- Gold rule -->
  <rect x="520" y="196" width="160" height="1.4" fill="url(#rule)"/>

  <!-- Glowing cross -->
  <g transform="translate(600 285)">
    <circle cx="0" cy="0" r="60" fill="url(#halo)"/>
    <rect x="-4" y="-44" width="8" height="88" rx="2" fill="url(#gold)"/>
    <rect x="-22" y="-22" width="44" height="8" rx="2" fill="url(#gold)"/>
  </g>

  <!-- Names -->
  <text x="600" y="430" text-anchor="middle"
        font-family="Cormorant Garamond, Georgia, serif"
        font-size="118" font-weight="300" letter-spacing="-1"
        fill="#2B2417">
    Sofía <tspan font-style="italic" fill="#7a6a52" font-size="64" dy="-12">&amp;</tspan> Mateo
  </text>

  <!-- Subline -->
  <text x="600" y="500" text-anchor="middle"
        font-family="Inter, Helvetica, Arial, sans-serif"
        font-size="18" letter-spacing="9" fill="#5a4d36">
    12 · SEPTIEMBRE · 2026
  </text>

  <!-- Subtle paper grain on top -->
  <rect width="1200" height="630" filter="url(#paper)" opacity="0.6"/>
</svg>
